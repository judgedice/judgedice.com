<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="No logo supplied — the name set in type is the mark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; height: 150px; display: flex; align-items: center; justify-content: center; background: var(--ink); }
  .mark { font-family: var(--font-serif); font-size: 52px; color: var(--paper); letter-spacing: -0.01em; }
  .mark .dot { color: var(--vermilion); }
  .sub { font-family: var(--font-sans); font-size: 11px; letter-spacing: .34em; text-transform: uppercase; color: var(--ink-faint); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="mark">Judge<span class="dot">.</span></div>
    <div class="sub">Delivering Joy</div>
  </div>
</body>
</html>
