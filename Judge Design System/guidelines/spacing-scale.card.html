<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="8px base, editorial extremes for hero breathing room" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; display: flex; align-items: flex-end; gap: 14px; }
  .u { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 100%; background: var(--vermilion); border-radius: 1px; }
  .u .n { font-family: var(--font-sans); font-size: 10px; color: var(--ink-faint); }
  .u .v { font-family: var(--font-sans); font-size: 11px; color: var(--ink); }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 44px; }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:8px"></div><span class="v">4</span><span class="n">1</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="v">8</span><span class="n">2</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="v">16</span><span class="n">4</span></div>
  <div class="col"><div class="bar" style="height:40px"></div><span class="v">32</span><span class="n">6</span></div>
  <div class="col"><div class="bar" style="height:56px"></div><span class="v">48</span><span class="n">7</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="v">96</span><span class="n">9</span></div>
  <div class="col"><div class="bar" style="height:104px"></div><span class="v">128</span><span class="n">10</span></div>
</body>
</html>
