<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; max-width: 640px; }
  .q { font-family: var(--font-serif); font-size: 21px; line-height: 1.45; color: var(--ink); margin: 0 0 14px; }
  .q em { font-style: italic; }
  .attr { font-family: var(--font-sans); font-size: 11px; color: var(--ink-faint); letter-spacing: .04em; }
  .accent { color: var(--vermilion); }
</style>
</head>
<body>
  <p class="q">"I've been building things on the internet since before it was cool. That sounds like a brag. <em class="accent">It's mostly just a fact.</em>"</p>
  <p class="attr">First person · short sentences · asides in parentheses · no synergy, no capabilities-deck cadence</p>
</body>
</html>
