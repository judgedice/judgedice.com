<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Paper to Ink" subtitle="Warm newsprint scale that carries the whole system" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: flex; gap: 0; border: var(--border-hair); border-radius: var(--radius-card); overflow: hidden; }
  .sw { flex: 1; height: 108px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .sw .n { font-family: var(--font-sans); font-size: 11px; letter-spacing: .02em; }
  .sw .h { font-family: var(--font-sans); font-size: 10px; opacity: .6; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#F2ECDF;color:#1C1712"><span class="n">paper</span><span class="h">#F2ECDF</span></div>
    <div class="sw" style="background:#F8F3E8;color:#1C1712"><span class="n">paper-raised</span><span class="h">#F8F3E8</span></div>
    <div class="sw" style="background:#EAE2D2;color:#1C1712"><span class="n">paper-sunk</span><span class="h">#EAE2D2</span></div>
    <div class="sw" style="background:#D8CFBE;color:#1C1712"><span class="n">line</span><span class="h">#D8CFBE</span></div>
    <div class="sw" style="background:#8B837A;color:#F8F3E8"><span class="n">ink-faint</span><span class="h">#8B837A</span></div>
    <div class="sw" style="background:#57514A;color:#F8F3E8"><span class="n">ink-soft</span><span class="h">#57514A</span></div>
    <div class="sw" style="background:#1C1712;color:#F2ECDF"><span class="n">ink</span><span class="h">#1C1712</span></div>
  </div>
</body>
</html>
