<!-- @dsCard group="Type" viewport="700x300" name="Heading Scale" subtitle="Anton display, UPPERCASE, over Source Serif sub-heads" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: var(--border-hair); }
  .r:last-child { border-bottom: 0; }
  .r .lab { font-family: var(--font-serif); font-size: 10px; color: var(--ink-faint); width: 92px; flex: none; }
  .r .d { font-family: var(--font-display); text-transform: uppercase; color: var(--ink); letter-spacing: 0; line-height: 1.0; }
  .r .s { font-family: var(--font-serif); color: var(--ink); letter-spacing: -0.02em; line-height: 1.1; }
</style>
</head>
<body>
  <div class="r"><span class="lab">display · Anton</span><span class="d" style="font-size:40px">The room, made simple</span></div>
  <div class="r"><span class="lab">h1 · Anton</span><span class="d" style="font-size:32px">Strategy meets production</span></div>
  <div class="r"><span class="lab">h2 · Anton</span><span class="d" style="font-size:26px">A roadmap that ships</span></div>
  <div class="r"><span class="lab">h3 · Source Serif</span><span class="s" style="font-size:22px">Architecture that doesn't collapse</span></div>
  <div class="r"><span class="lab">h4 · Source Serif</span><span class="s" style="font-size:18px">The operational layer that makes it real</span></div>
</body>
</html>
