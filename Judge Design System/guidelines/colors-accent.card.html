<!-- @dsCard group="Colors" viewport="700x160" name="Accent — Vermilion & Ink Blue" subtitle="A spice, never the meal — one warm red, one muted blue" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { height: 96px; border-radius: var(--radius-card); border: var(--border-hair); display: flex; flex-direction: column; justify-content: flex-end; padding: 9px; }
  .sw .n { font-family: var(--font-sans); font-size: 11px; }
  .sw .h { font-family: var(--font-sans); font-size: 10px; opacity: .65; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:#CB4127;color:#fff"><span class="n">vermilion</span><span class="h">#CB4127</span></div>
    <div class="sw" style="background:#A6321C;color:#fff"><span class="n">deep</span><span class="h">#A6321C</span></div>
    <div class="sw" style="background:#F0D8CF;color:#A6321C"><span class="n">tint</span><span class="h">#F0D8CF</span></div>
    <div class="sw" style="background:#274654;color:#fff"><span class="n">blue</span><span class="h">#274654</span></div>
    <div class="sw" style="background:#1B333E;color:#fff"><span class="n">blue-deep</span><span class="h">#1B333E</span></div>
    <div class="sw" style="background:#D3DDE0;color:#274654"><span class="n">blue-tint</span><span class="h">#D3DDE0</span></div>
  </div>
</body>
</html>
